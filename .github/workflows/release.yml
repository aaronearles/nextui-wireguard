name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross toolchain and build deps
        run: sudo apt-get install -y gcc-aarch64-linux-gnu curl make tar xz-utils zip unzip file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build wireguard-go for aarch64
        run: |
          git clone https://github.com/WireGuard/wireguard-go.git /tmp/wireguard-go
          cd /tmp/wireguard-go
          GOARCH=arm64 GOOS=linux CGO_ENABLED=0 go build -o $GITHUB_WORKSPACE/bin/tg5040/wireguard-go .

      - name: Build and package
        run: make WG_VERSION=1.0.20210914 TRIPLE=aarch64-linux-gnu package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: build/WireGuard.pak.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
