name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: muslcc/x86_64:aarch64-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: apk add --no-cache curl make tar xz zip file

      - name: Build wg binary
        run: make WG_VERSION=1.0.20210914 all

      - name: Verify binary
        run: |
          file bin/tg5040/wg
          # Must say: ELF 64-bit LSB executable, ARM aarch64, statically linked

      - name: Package
        run: make package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: build/WireGuard.pak.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
