name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross toolchain and build deps
        run: sudo apt-get install -y gcc-aarch64-linux-gnu curl make tar xz-utils zip file

      - name: Build and package
        run: make WG_VERSION=1.0.20210914 TRIPLE=aarch64-linux-gnu package

      - name: Verify binary
        run: |
          file bin/tg5040/wg
          # Must say: ELF 64-bit LSB executable, ARM aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: build/WireGuard.pak.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
